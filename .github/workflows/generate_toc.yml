name: Generate Course ToC

# ── TRIGGER ────────────────────────────────────────────────────────────[...]
# Fires only on pushes to `main` where at least one .tex file inside
# the classes/ directory tree was changed.
on:
  push:
    branches:
      - main
    paths:
      - 'classes/**/*.tex'
      - 'admin/python/tex2include.md'
      - 'admin/python/combine_toc.py'

# Cancel older in-progress runs on the same branch to avoid wasted work.
concurrency:
  group: generate-course-toc-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ── PERMISSIONS ──────────────────────────────────────────────────────────�[...]
# `contents: write` lets the workflow create branches, commit, and push.
permissions:
  contents: write

# ── JOB ─────────────────────────────────────────────────────────────[...]
jobs:
  generate-toc:
    runs-on: ubuntu-latest

    # Guard: skip if the commit was made by this workflow itself (prevents
    # infinite loops). GitHub Actions bot commits use this actor name.
    if: github.actor != 'github-actions[bot]'

    steps:

      # ── STEP 1: Check out the repo ────────────────────────────────────────
      # fetch-depth: 1  →  shallow clone for faster checkout.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── STEP 2: Set up Python ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('admin/python/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # ── STEP 3: Install Python dependencies ──────────────────────────────
      # Installs from requirements.txt if present; skips silently if not.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f admin/python/requirements.txt ]; then
            pip install -r admin/python/requirements.txt
          else
            echo "No requirements.txt found, skipping."
          fi

      # ── STEP 4: Restore/install cached TinyTeX ──────────────────────────
      - name: Restore TinyTeX cache
        id: tinytex-cache
        uses: actions/cache@v4
        with:
          path: ~/.TinyTeX
          key: ${{ runner.os }}-tinytex-v3-${{ hashFiles('.github/workflows/generate_toc.yml') }}
          restore-keys: |
            ${{ runner.os }}-tinytex-v3-

      - name: Verify TinyTeX cache
        id: tinytex-verify
        run: |
          tinytex_bin=$(find "$HOME/.TinyTeX/bin" -mindepth 1 -maxdepth 1 -type d | head -n 1 || true)

          if [ -n "$tinytex_bin" ] && [ -x "$tinytex_bin/pdflatex" ] && [ -x "$tinytex_bin/tlmgr" ]; then
            echo "valid=true" >> $GITHUB_OUTPUT
            echo "tinytex_bin=$tinytex_bin" >> $GITHUB_OUTPUT
          else
            rm -rf "$HOME/.TinyTeX"
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Install TinyTeX (cache miss only)
        if: steps.tinytex-cache.outputs.cache-hit != 'true' || steps.tinytex-verify.outputs.valid != 'true'
        run: |
          set -euxo pipefail

          curl -fsSL https://yihui.org/tinytex/install-bin-unix.sh | sh

          tinytex_bin=$(find "$HOME/.TinyTeX/bin" -mindepth 1 -maxdepth 1 -type d | head -n 1)
          export PATH="$tinytex_bin:$PATH"

          # Use a stable CTAN mirror to avoid checksum/download issues
          tlmgr option repository https://mirror.ctan.org/systems/texlive/tlnet

          # Update tlmgr + packages before installing large collections
          tlmgr update --self --all

          # Install required collections with a few retries for transient mirror/network blips
          installed=false
          for i in 1 2 3; do
            if tlmgr install \
              collection-latexrecommended \
              collection-latexextra \
              collection-fontsrecommended; then
              installed=true
              break
            fi
            sleep $((i*10))
          done

          if [ "$installed" != "true" ]; then
            echo "ERROR: TinyTeX package installation failed after retries." >&2
            exit 1
          fi

      - name: Add TinyTeX to PATH
        run: |
          TINYTEX_BIN=$(find "$HOME/.TinyTeX/bin" -mindepth 1 -maxdepth 1 -type d | head -n 1)
          if [ -z "$TINYTEX_BIN" ]; then
            echo "ERROR: TinyTeX bin directory not found." >&2
            exit 1
          fi
          export PATH="$TINYTEX_BIN:$PATH"
          echo "$TINYTEX_BIN" >> $GITHUB_PATH
          command -v pdflatex
          pdflatex --version

      # ── STEP 5: Run the combine_toc.py script ────────────────────────────
      # Working directory is set to the script's location so relative
      # paths inside the script resolve correctly.
      - name: Run combine_toc.py
        working-directory: admin/python
        run: |
          python3 combine_toc.py \
            --classes-dir ../../classes \
            -f tex2include.md \
            -o ../../course_info/course_ToC/course_ToC.tex \
            --no-compile
  
      # ── STEP 6: Compile the generated .tex file ──────────────────────────
      - name: Compile course_ToC.tex
        working-directory: course_info/course_ToC
        run: |
          pdflatex -interaction=nonstopmode course_ToC.tex
          # Run twice to resolve cross-references / TOC entries
          pdflatex -interaction=nonstopmode course_ToC.tex

      # ── STEP 7: Commit and push output files ─────────────────────────────
      # Configures git identity, stages only .tex/.pdf artifacts, and pushes
      # directly to main with a single retry after rebase if main moved.
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push output files
        id: commit_push
        run: |
          find course_info/course_ToC -maxdepth 1 -type f \( -name '*.tex' -o -name '*.pdf' \) -print0 | xargs -0 -r git add --
          # Only commit if there is actually something staged
          if git diff --cached --quiet; then
            echo "No changes to commit."
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore: auto-generate course_ToC [skip ci]"
            pushed=false
            max_attempts=4
            for attempt in $(seq 1 ${max_attempts}); do
              if git pull --rebase origin main && git push origin HEAD:main; then
                pushed=true
                break
              fi

              if [ "${attempt}" -lt "${max_attempts}" ]; then
                backoff=$((2 ** attempt))
                echo "Push attempt ${attempt} failed; retrying in ${backoff}s..."
                sleep "${backoff}"
              fi
            done

            if [ "${pushed}" != "true" ]; then
              echo "ERROR: Failed to push to main after retries." >&2
              exit 1
            fi

            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi
