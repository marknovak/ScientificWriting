name: Generate Course ToC

# ── TRIGGER ────────────────────────────────────────────────────────────[...]
# Fires only on pushes to `main` where at least one .tex file inside
# the classes/ directory tree was changed.
on:
  push:
    branches:
      - main
    paths:
      - 'classes/**/*.tex'

# ── PERMISSIONS ──────────────────────────────────────────────────────────�[...]
# `contents: write` lets the workflow create branches, commit, and push.
permissions:
  contents: write

# ── JOB ─────────────────────────────────────────────────────────────[...]
jobs:
  generate-toc:
    runs-on: ubuntu-latest

    # Guard: skip if the commit was made by this workflow itself (prevents
    # infinite loops). GitHub Actions bot commits use this actor name.
    if: github.actor != 'github-actions[bot]'

    steps:

      # ── STEP 1: Check out the repo ────────────────────────────────────────
      # fetch-depth: 0  →  full history, required so we can create branches
      #                    that have proper ancestry.
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── STEP 2: Create and switch to a new auto branch ───────────────────
      # Branch name embeds the short SHA so every trigger gets a unique branch.
      - name: Create new branch
        run: |
          SHORT_SHA="${{ github.sha }})"
          BRANCH_NAME="auto/generate_all_TOC-${SHORT_SHA::7}"
          echo "BRANCH_NAME=${BRANCH_NAME}" >> $GITHUB_ENV
          git checkout -b "${BRANCH_NAME}"

      # ── STEP 3: Set up Python ─────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── STEP 4: Install Python dependencies ──────────────────────────────
      # Installs from requirements.txt if present; skips silently if not.
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f admin/python/requirements.txt ]; then
            pip install -r admin/python/requirements.txt
          else
            echo "No requirements.txt found, skipping."
          fi

      # ── STEP 5: Install LaTeX  ─────────
      # texlive-latex-extra covers most common packages; add others as needed.
      - name: Install LaTeX
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            texlive-latex-base \
            texlive-latex-extra \
            texlive-fonts-recommended \
            texlive-binaries
          command -v pdflatex
          pdflatex --version

      # ── STEP 6: Run the combine_toc.py script ────────────────────────────
      # Working directory is set to the script's location so relative
      # paths inside the script resolve correctly.
      - name: Run combine_toc.py
        working-directory: admin/python
        run: |
          python3 combine_toc.py \
            --classes-dir ../../classes \
            -f tex2include.md \
            -o ../../course_info/course_ToC/course_ToC.tex
  
      # ── STEP 7: Install LaTeX and compile the generated .tex file ─────────
      # texlive-latex-extra covers most common packages; add others as needed.          
      - name: Compile course_ToC.tex
        working-directory: course_info/course_ToC
        run: |
          pdflatex -interaction=nonstopmode course_ToC.tex
          # Run twice to resolve cross-references / TOC entries
          pdflatex -interaction=nonstopmode course_ToC.tex

      # ── STEP 8: Commit and push output files ─────────────────────────────
      # Configures git identity, stages all changed/new files under
      # course_info/course_ToC/, and pushes the new branch to origin.
      - name: Configure git identity
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit and push output files
        run: |
          git add course_info/course_ToC/
          # Only commit if there is actually something staged
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore: auto-generate course_ToC [skip ci]"
            git push --set-upstream origin "${BRANCH_NAME}"
            echo "Pushed branch: ${BRANCH_NAME}"
          fi
